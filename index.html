// ===== M2 UNESCO =====
m2_nav: "2. UNESCO AI 素養架構",
m2_title: "聯合國教科文組織 AI 能力架構：學生與教師",
m2_overview: "UNESCO 於 2024 年發布兩份姊妹文件：《學生 AI 能力架構》與《教師 AI 能力架構》。兩者共用同一套進程邏輯——獲得（Acquire）、深化（Deepen）、創造（Create）——強調 AI 素養不只是「會不會用」，更是一段從理解、應用到批判性創造的歷程。",
m2_highlights: [
  "三層進程：獲得（基礎認知）、深化（應用與評估）、創造（設計與創新）",
  "學生架構的四個構面：人本心態、AI 倫理、AI 技術與應用、AI 系統設計",
  "教師架構強調人本心態、倫理安全使用、AI 基礎與應用、AI 教學法、專業發展五個支柱",
  "兩份文件皆以「人本」（human-centred）為起點，而非以技術能力為起點"
],
m2_p1: "UNESCO 兩份架構最大的特色，是把「人本心態」放在最優先的位置，而不是先談技術操作。這呼應 UNESCO 一貫的教育哲學：科技應服務於人的全面發展，而非反過來讓人適應科技。學生架構的四個構面——人本心態、AI 倫理、AI 技術與應用、AI 系統設計——依此順序排列，本身就是一種價值宣示。",
m2_p2: "「獲得、深化、創造」三層進程，與 DigCompEdu 的六級分級邏輯不同，UNESCO 選擇更簡化的三階段描述。獲得階段聚焦基本認知與覺察（知道 AI 是什麼、能做什麼、有什麼風險）；深化階段聚焦情境化應用與批判評估（能在特定任務中選用合適工具，並評估其輸出是否可信）；創造階段則聚焦主動設計與創新（能參與設計、調整、甚至質疑既有 AI 系統的決策邏輯）。",
m2_p3: "教師架構在學生架構的基礎上，額外加入「AI 教學法」與「專業發展」兩個支柱，反映教師角色的雙重性：教師不只是 AI 的使用者，更是引導學生建立 AI 素養的「中介者」。這也是為什麼許多商管課程在導入 AI 工具時，教師需要的素養往往比單純的「工具熟練度」更複雜——他們需要同時具備使用能力與教學轉化能力。",
m2_wrapup: "UNESCO 架構提供了一套以人為本、簡潔的三階段進程語言，並透過學生與教師兩份姊妹文件，清楚劃分不同角色的素養重點，是國際上最常被引用的 AI 教育素養參照之一。",
m2_terms: [
  { front: "獲得 Acquire", back: "UNESCO 三層進程第一階段，聚焦基本認知與覺察" },
  { front: "深化 Deepen", back: "第二階段，聚焦情境化應用與批判性評估 AI 輸出" },
  { front: "創造 Create", back: "第三階段，聚焦主動設計、調整甚至質疑 AI 系統" },
  { front: "人本心態", back: "學生與教師架構共同的首要構面，強調科技服務於人而非反之" },
  { front: "AI 教學法", back: "教師架構獨有支柱，指引導學生建立 AI 素養的教學轉化能力" },
  { front: "AI 系統設計", back: "學生架構第四構面，指參與或理解 AI 系統設計邏輯的能力" }
],
m2_q: [
  { q: "UNESCO AI 能力架構的三層進程依序是？", opts: ["認知、應用、精通","獲得、深化、創造","初階、中階、高階","覺察、整合、領導"], ans: _A1, exp: "三層進程為獲得（Acquire）、深化（Deepen）、創造（Create）。" },
  { q: "UNESCO 學生與教師架構共同最優先強調的構面是？", opts: ["程式撰寫能力","人本心態","硬體操作能力","行銷應用能力"], ans: _A1, exp: "兩份架構都將「人本心態」列為優先構面，呼應 UNESCO 一貫教育哲學。" },
  { q: "UNESCO 教師架構比學生架構多出的支柱是？", opts: ["AI 倫理","AI 技術與應用","AI 教學法與專業發展","人本心態"], ans: _A2, exp: "教師架構額外加入「AI 教學法」與「專業發展」兩個支柱。" },
  { q: "「深化」階段的核心特徵是？", opts: ["完全不接觸 AI","基礎認知與覺察","情境化應用與批判性評估","設計全新 AI 系統"], ans: _A2, exp: "深化階段強調在特定情境中應用 AI 並批判評估其輸出。" },
  { q: "UNESCO 架構發布的年度是？", opts: ["2018","2020","2024","2026"], ans: _A2, exp: "UNESCO 學生與教師 AI 能力架構皆於 2024 年發布。" }
],

// ===== M3 OECD =====
m3_nav: "3. OECD／歐盟執委會架構",
m3_title: "OECD 與歐盟執委會共同發布的 AI 素養架構",
m3_overview: "OECD 與歐盟執委會（European Commission）共同發展了一套 AI 素養架構，提出四個行為構面：理解並運用 AI（Engaging）、創造性運用 AI（Creating）、管理 AI 風險（Managing）、設計 AI 系統（Designing）。架構同時也回應了一個日益受關注的學界議題——「元認知怠惰」（metacognitive laziness）：過度依賴 AI 可能削弱使用者自身的批判思考與獨立判斷能力。",
m3_highlights: [
  "由 OECD 與歐盟執委會共同開發，並非 OECD 單獨制定",
  "四大行為構面：理解運用、創造性運用、管理風險、設計系統",
  "回應學界對「元認知怠惰」的關注，但此概念並非 OECD 獨創或專屬",
  "強調在效率與批判思考之間取得平衡，而非鼓吹無條件信任 AI 工具"
],
m3_p1: "需要先澄清一個常見的誤解：這套架構並不是 OECD 單方面制定的產物，而是 OECD 與歐盟執委會合作開發的成果，這也說明了它與歐盟其他數位素養架構（如 DigCompEdu）在精神上的高度一致性——同樣重視人本、批判思考與情境化應用。",
m3_p2: "四個行為構面當中，「理解並運用 AI」是最基礎的層次，指能辨識 AI 系統的存在、理解其基本運作邏輯與限制；「創造性運用 AI」進一步要求能將 AI 工具整合進創作、分析、決策等任務中；「管理 AI 風險」聚焦於辨識偏誤、隱私、可信度等風險並採取對應措施；「設計 AI 系統」則是最進階的構面，涉及參與 AI 系統本身的建構與調整邏輯。",
m3_p3: "「元認知怠惰」是近年學術文獻（如 2024 年底發表的研究 arXiv:2412.09315）中逐漸受到重視的概念，指當使用者過度仰賴 AI 提供答案時，會逐漸降低自己主動思考、驗證、質疑的意願與能力。這個概念並非 OECD 獨家提出，而是學界廣泛討論的風險之一，OECD 的《數位教育展望》系列報告引用並呼應了這項擔憂，但將其視為 OECD 唯一或專屬的架構標準並不準確。對教育工作者而言，這提醒我們在設計 AI 融入教學的活動時，需要刻意保留「不假手 AI」的思考訓練環節。",
m3_wrapup: "OECD／歐盟執委會架構以四個行為構面描繪 AI 素養的進階路徑，並提醒我們留意過度依賴 AI 可能帶來的「元認知怠惰」風險——這是一項需要持續關注、但屬於整個學界共同探討的議題，而非單一機構的專利主張。",
m3_terms: [
  { front: "理解並運用 AI", back: "OECD/EC 架構最基礎構面，指辨識 AI 系統並理解其運作邏輯與限制" },
  { front: "創造性運用 AI", back: "整合 AI 工具進入創作、分析、決策等任務的能力" },
  { front: "管理 AI 風險", back: "辨識偏誤、隱私、可信度等風險並採取對應措施的能力" },
  { front: "設計 AI 系統", back: "最進階構面，涉及參與 AI 系統建構與調整邏輯" },
  { front: "元認知怠惰", back: "過度依賴 AI 導致主動思考、驗證、質疑能力下降的學界關注議題，非 OECD 專屬概念" },
  { front: "OECD 與歐盟執委會共同開發", back: "澄清架構並非 OECD 單方制定，而是跨機構合作成果" }
],
m3_q: [
  { q: "OECD AI 素養架構實際上是由誰開發的？", opts: ["OECD 單獨制定","OECD 與歐盟執委會共同開發","僅由歐盟執委會制定","由聯合國主導制定"], ans: _A1, exp: "此架構是 OECD 與歐盟執委會（European Commission）共同開發的成果。" },
  { q: "下列哪一項不是該架構的四大行為構面？", opts: ["理解並運用 AI","創造性運用 AI","管理 AI 風險","背誦 AI 演算法公式"], ans: _A3, exp: "四大構面為理解運用、創造性運用、管理風險、設計系統，不包含背誦公式。" },
  { q: "「元認知怠惰」概念的正確理解是？", opts: ["OECD 獨家提出且專屬於該架構的概念","學界廣泛討論、OECD 報告引用呼應的風險議題","與 AI 素養完全無關的心理學名詞","僅適用於兒童教育的概念"], ans: _A1, exp: "元認知怠惰是學界廣泛討論的議題，OECD 報告引用並呼應，但並非其獨創或專屬概念。" },
  { q: "「設計 AI 系統」構面相較其他三項構面的特性是？", opts: ["最基礎、最容易達成","與其他構面完全無關","最進階，涉及參與系統建構邏輯","只適用於工程師，與一般使用者無關"], ans: _A2, exp: "設計 AI 系統是四構面中最進階的層次，涉及參與系統本身的建構與調整。" },
  { q: "面對元認知怠惰風險，教育工作者較合適的回應策略是？", opts: ["完全禁止學生使用任何 AI 工具","刻意保留不假手 AI 的思考訓練環節","放任不管，相信學生會自我調節","只在期末考前才提醒一次"], ans: _A1, exp: "建議在設計教學活動時刻意保留獨立思考、驗證、質疑的訓練環節，平衡 AI 使用與批判思考。" }
],

// ===== M4 US-DOE =====
m4_nav: "4. US-DOE 取向",
m4_title: "美國教育部「以教育者為中心」取向",
m4_overview: "美國教育部（US Department of Education）於 2023 年 5 月發布報告《人工智慧與教學的未來》（Artificial Intelligence and the Future of Teaching and Learning），提出「始終以教育者為中心」（Always Center Educators, ACE）的取向。需要特別澄清：ACE 是一種政策精神與價值取向，並非一套正式編號、條列式的原則清單。",
m4_highlights: [
  "ACE 是取向（orientation）而非正式編號的核心原則清單",
  "核心精神：教育者應保有決策主導權，AI 是輔助而非取代",
  "強調「人在迴圈中」（human-in-the-loop）作為設計與導入 AI 工具的前提",
  "報告同時提醒風險與機會並存，呼籲謹慎且漸進的導入步調"
],
m4_p1: "許多二手資料在轉述美國教育部這份報告時，容易誤將 ACE 描述成「五大原則」或「七大核心要素」這類正式條列清單，但查閱原始報告會發現，ACE 更準確的定位是貫穿全文的一種政策取向與價值立場，而不是一份可以逐條打勾核對的清單。這個澄清很重要，因為它影響我們如何「使用」這份文件——不是拿來做合規檢核，而是用來檢視一項 AI 教育政策或工具導入計畫，是否真正把教育者的專業判斷放在核心位置。",
m4_p2: "ACE 取向的核心精神可以歸納為幾個反覆出現的主題：教育者應在 AI 工具的選用、評估與調整過程中保有實質決策權，而非被動接受由科技公司或行政單位預先設定好的方案；AI 應該被設計來增強教育者的專業能力，而非取代教育者的判斷；任何 AI 系統都應該保有「人在迴圈中」的設計，確保關鍵教育決策（如學生評量、個別化學習路徑）最終由人來把關。",
m4_p3: "報告也誠實地呈現了機會與風險並存的態度，既肯定 AI 在個別化學習、行政效率上的潛力，也提醒資料隱私、演算法偏誤、過度自動化等風險。這種「審慎樂觀」的基調，與本平台前述三個架構（DigCompEdu、UNESCO、OECD）所共享的人本精神是一致的——四大架構雖然來自不同機構、使用不同詞彙，但都不約而同地把「人」的判斷與能動性放在 AI 系統之上。",
m4_wrapup: "US-DOE 的 ACE 取向提醒我們：任何 AI 教育政策的評估標準，都應該回到「教育者的專業判斷是否被保留與強化」這個核心問題，而不是被簡化成一份可勾選的清單。",
m4_terms: [
  { front: "ACE 取向", back: "Always Center Educators，始終以教育者為中心，是一種政策精神而非正式編號原則清單" },

  { front: "審慎樂觀", back: "US-DOE 報告對 AI 教育應用機會與風險並陳的基調" },
  { front: "教育者決策主導權", back: "ACE 核心精神之一，教育者應在 AI 工具選用與調整中保有實質決策權" },
  { front: "報告發布時間", back: "2023 年 5 月，《人工智慧與教學的未來》報告" },
  { front: "常見誤讀", back: "將 ACE 誤認為正式編號的「五大原則」或「核心要素清單」，實則為貫穿全文的取向" }
],
m4_q: [
  { q: "ACE 在 US-DOE 報告中的正確定位是？", opts: ["一份正式編號的五大核心原則清單","貫穿全文的政策取向與價值立場","美國聯邦法律強制規範","一套技術操作手冊"], ans: _A1, exp: "ACE 是一種取向（orientation），並非正式編號條列的原則清單。" },
  { q: "ACE 取向最核心的精神是？", opts: ["AI 應完全取代教師的判斷","教育者應保有決策主導權，AI 是輔助而非取代","學生應自主決定是否使用 AI","學校應禁止使用任何 AI 工具"], ans: _A1, exp: "ACE 核心精神是教育者保有決策主導權，AI 扮演輔助角色。" },

// ===== M5 跨架構整合比較 =====
m5_nav: "5. 跨架構整合比較",
m5_title: "五大構面 D1–D5：跨架構的共通邏輯",
m5_overview: "比較四大架構後可以發現，儘管用語與分級方式不同，但背後存在高度一致的核心關注。本平台將其整合為五個共通構面（D1–D5），作為後續台灣本土化共通語言的基礎結構。",
m5_highlights: [
  "D1 AI 基礎素養 對應 DigCompEdu 數位資源、UNESCO 獲得階段、OECD 理解運用",
  "D2 教學／應用整合 對應 DigCompEdu 教與學、UNESCO 深化階段、OECD 創造性運用",
  "D3 倫理與批判判斷 對應 UNESCO AI 倫理、OECD 元認知怠惰警示、US-DOE 人在迴圈中",
  "D4 治理與風險管理 對應 OECD 管理風險、US-DOE 教育者決策主導權",
  "D5 持續成長與創新 對應 DigCompEdu C1–C2 領航者/先驅者、UNESCO 創造階段"
],
m5_p1: "四大架構各有其發展脈絡與側重，但若把它們並排檢視，會發現一個共通的底層邏輯：素養的養成都是從「基礎認知」開始，逐步走向「應用整合」，再深化到「倫理批判」，同時需要「治理風險」的配套，最終指向「持續成長」的能力。這五個階段並非逐步遞進的考試關卡，而是五個並存、互相支撐的構面。",
m5_p2: "以 D1 AI 基礎素養為例，它對應 DigCompEdu 的「數位資源」領域、UNESCO 的「獲得」階段，以及 OECD 的「理解並運用 AI」構面——三者用語不同，但都指向「知道 AI 是什麼、能做什麼、限制在哪裡」這個起點。D2 教學／應用整合則對應 DigCompEdu 的「教與學」、UNESCO 的「深化」階段、OECD 的「創造性運用」，三者共同關注「能否將 AI 工具有效融入具體任務情境」。",
m5_p3: "D3 倫理與批判判斷整合了 UNESCO 的「AI 倫理」構面、OECD 對「元認知怠惰」的警示，以及 US-DOE「人在迴圈中」的設計原則——三者從不同角度提醒我們：AI 素養不只是技術能力，更包含「知道什麼時候該質疑、該驗證、該堅持人的判斷」的能力。D4 治理與風險管理呼應 OECD 的「管理風險」構面與 US-DOE 強調的「教育者決策主導權」，關注組織層級的政策與配套機制。D5 持續成長與創新則對應 DigCompEdu 最高兩級（C1 領航者、C2 先驅者）與 UNESCO 的「創造」階段，指向素養養成沒有終點，而是持續精進的歷程。",
m5_wrapup: "D1–D5 五大構面不是另創新架構，而是四大國際參照的「最大公約數」，讓校長、教師、學生與家庭在討論 AI 素養時，能用同一套五個構面對話，再各自回溯到原始架構查找細節。",
m5_terms: [
  { front: "D1 AI 基礎素養", back: "知道 AI 是什麼、能做什麼、限制在哪裡的起點構面" },
  { front: "D2 教學／應用整合", back: "能否將 AI 工具有效融入具體任務與教學情境" },
  { front: "D3 倫理與批判判斷", back: "知道何時該質疑、驗證、堅持人的判斷的能力" },
  { front: "D4 治理與風險管理", back: "組織層級的 AI 使用政策、風險辨識與配套機制" },
  { front: "D5 持續成長與創新", back: "素養養成沒有終點，持續精進、領導與創新的能力" },
  { front: "最大公約數邏輯", back: "D1–D5 整合四大架構共通關注，而非另立新標準" }
],
m5_q: [
  { q: "D1 AI 基礎素養主要對應四大架構中的哪些概念？", opts: ["DigCompEdu 數位資源、UNESCO 獲得、OECD 理解運用","DigCompEdu C2、UNESCO 創造、OECD 設計系統","僅對應 US-DOE 取向","與四大架構皆無關"], ans: _A0, exp: "D1 對應 DigCompEdu 數位資源領域、UNESCO 獲得階段、OECD 理解並運用 AI 構面。" },
  { q: "D3 倫理與批判判斷整合了哪些概念？", opts: ["僅 DigCompEdu 的評量領域","UNESCO AI 倫理、OECD 元認知怠惰警示、US-DOE 人在迴圈中","僅 UNESCO 的人本心態","僅 OECD 的設計系統構面"], ans: _A1, exp: "D3 整合 UNESCO 的 AI 倫理構面、OECD 對元認知怠惰的警示，以及 US-DOE 人在迴圈中的原則。" },
  { q: "D1–D5 五大構面的設計目的是？", opts: ["取代四大國際架構成為新標準","作為四大架構的最大公約數，提供共通對話語言","僅供學術研究使用，不適合實務導入","只適用於理工科系，不適用於商管課程"], ans: _A1, exp: "D1–D5 是四大架構的整合，作為共通語言而非取代品。" },
  { q: "D5 持續成長與創新對應哪些原始概念？", opts: ["DigCompEdu A1 與 UNESCO 獲得階段","DigCompEdu C1–C2 與 UNESCO 創造階段","僅 OECD 管理風險構面","僅 US-DOE 審慎樂觀態度"], ans: _A1, exp: "D5 對應 DigCompEdu 最高兩級（C1、C2）與 UNESCO 的創造階段。" }
],

// ===== M6 台灣本土化與四方共識 =====
m6_nav: "6. 台灣本土化與四方共識",
m6_title: "校長．師．生．親：台灣商管課程的 AI 素養共通語言",
m6_overview: "將 D1–D5 五大構面應用於台灣商管課程情境，需要面對一個現實：校長（學校行政主管）、教師、學生、家庭／產業四方的關注重點與所需的細緻程度並不相同。本模組說明如何在「不追求完美評量」的前提下，為四方建立一套簡化但足以溝通的共通分級語言，並對應到本平台「互動實驗室」中的四方自評工具。",
m6_highlights: [
  "教師與學生採六級完整分級（對應 DigCompEdu A1–C2 邏輯），因為兩者是 AI 導入教學現場的第一線",
  "校長與家庭／產業採三級簡化分級（初步認知／基本支持或理解配合／積極治理或倡議），降低參與門檻",
  "四方共用同一套 D1–D5 構面語言，只是分級顆粒度不同，確保彼此對話時不會雞同鴨講",
  "自評工具刻意不做商管領域情境特化，保留通用敘述，避免簡化掉跨領域可比較性"
],
m6_p1: "為什麼教師與學生用六級、校長與家庭用三級？因為教師與學生是 AI 導入教學現場最直接的行動者，需要更細緻的自我定位來規劃個人成長路徑，六級分級能呼應 DigCompEdu 的精神；而校長與家庭／產業的角色更多是「支持者」與「監督者」，他們需要的不是精確的自我定位，而是快速判斷「目前狀態是否足以支持/監督教學現場的 AI 導入」，三級簡化（初步認知、基本支持或理解配合、積極治理或領導／倡議）已足夠達成溝通目的。",
m6_p2: "四方共用 D1（基礎素養）、D2（應用整合）、D3（倫理判斷）、D4（治理風險）、D5（成長創新）這套構面語言，意味著當教師說「我在 D3 倫理判斷上是 B1」、校長說「我在 D3 上是基本支持」時，雙方至少知道在談論同一件事——而不是各自用「AI 素養好不好」這種模糊籠統的說法溝通，卻其實談論的是完全不同的面向。",
m6_p3: "本平台刻意不將自評工具特化成財報分析、行銷企劃等具體商管情境案例，而是保留通用敘述。這個設計選擇背後的考量是：過度情境化雖然更貼近特定課程，但會犧牲跨領域、跨課程的可比較性，而「建立共通語言」這個目標，恰恰需要的是可廣泛套用、不被特定情境綁架的描述語言。教師可以在解讀自評結果時，自行對應到自己課程的具體案例。",
m6_wrapup: "台灣本土化的關鍵不是發明新架構，而是在尊重四方角色差異的前提下，用同一套 D1–D5 語言、不同的分級顆粒度，搭建起一個低門檻、可快速達成基本共識的溝通機制。實際的量化評量工具請至「互動實驗室」模組體驗。",
m6_terms: [
  { front: "四位一體", back: "校長（學校行政主管）、教師、學生、家庭／產業／社會四方共同構成的 AI 導入生態系" },
  { front: "六級／三級雙軌設計", back: "教師生用六級完整分級，校長家庭用三級簡化分級，因應角色差異" },
  { front: "初步認知／基本支持／積極治理", back: "校長端三級簡化分級用語" },
  { front: "初步認知／理解配合／積極倡議", back: "家庭／產業端三級簡化分級用語" },
  { front: "通用敘述原則", back: "自評工具刻意不特化商管情境案例，保留跨領域可比較性" },
  { front: "基本共識而非完美評量", back: "本平台設計哲學：目標是建立對話起點，而非追求學術精確的測量工具" }
],
m6_q: [
  { q: "為什麼教師與學生採六級分級，校長與家庭採三級分級？", opts: ["六級比三級更準確，沒有其他原因","教師生是教學現場第一線行動者需要細緻定位，校長家庭是支持監督者只需快速判斷","三級分級是因為校長和家長能力較差","這是隨機決定，沒有設計邏輯"], ans: _A1, exp: "六級三級雙軌設計呼應角色差異：行動者需要細緻自我定位，支持監督者需要快速判斷。" },
  { q: "四方共用 D1–D5 構面語言的主要目的是？", opts: ["讓所有人得到完全相同的分數","確保彼此對話時談論的是同一個構面，避免雞同鴨講","用來排名比較不同利害關係人","取代學校原有的考核制度"], ans: _A1, exp: "共用構面語言的目的是讓四方溝通時聚焦在同一個面向上，而非各說各話。" },
  { q: "本平台自評工具為何不特化成財報分析、行銷企劃等商管案例？", opts: ["因為設計者沒有商管背景","保留通用敘述以維持跨領域可比較性，這是建立共通語言的核心需求","商管領域不需要 AI 素養","特化案例在技術上無法實現"], ans: _A1, exp: "保留通用敘述是為了不犧牲跨領域、跨課程的可比較性，呼應共通語言的設計目標。" },
  { q: "本平台四方自評工具的設計哲學是？", opts: ["追求學術上完全精確的測量","建立基本共識與對話起點，不追求完美評量","作為正式人事考核依據","僅供校長單方使用"], ans: _A1, exp: "設計哲學明確是建立共通語言與基本共識，而非追求完美或拿來做正式考核。" }
],

m0_nav: "0. Executive Summary",
m0_title: "From Theory to Consensus: Four International References and Taiwan's Local Practice",
m0_intro: "Artificial intelligence is reshaping how universities teach and learn, yet the term \"AI literacy\" often means different things to different stakeholders. This platform synthesizes four influential international frameworks — the EU's DigCompEdu and AI Pioneers Project, UNESCO's AI Competency Frameworks, the OECD/European Commission's joint AI Literacy Framework, and the US Department of Education's educator-centred orientation — explaining each framework's core claims, intended audience, and limitations. After reviewing all four sources, the platform integrates and compares them, then localizes the result into a common language and self-assessment tool usable by principals, teachers, students, and families/industry within Taiwan's business education context. We do not aim for assessment perfection, but for a ten-minute path to a shared, basic consensus on \"roughly where we stand\" in AI literacy — a starting point for dialogue and action.",
m0_why: "Why a common language?",
m0_why_desc: "Principals care about governance and risk, teachers about pedagogical integration, students about learning effectiveness, and families/industry about future employability. When these groups use different vocabularies and rating scales, communication easily breaks down. This platform is not another new standard — it is a translation map connecting four existing international frameworks and rendering them usable on Taiwanese campuses.",
m0_modules: [
  { num: "01", title: "DigCompEdu + AI Pioneers", desc: "The EU's educator digital competence framework and its AI supplement" },
  { num: "02", title: "UNESCO AI Competency Framework", desc: "Student and teacher AI progression: Acquire, Deepen, Create" },
  { num: "03", title: "OECD / European Commission Framework", desc: "Four behavioural domains and the \"metacognitive laziness\" risk" },
  { num: "04", title: "US-DOE Orientation", desc: "A human-centred orientation for educator-led AI adoption" },
  { num: "05", title: "Cross-Framework Integration", desc: "Mapping D1–D5 across all four sources" },
  { num: "06", title: "Taiwan Localization & Four-Party Consensus", desc: "A common language and tiering for principals, teachers, students, families" }
],

// M1
m1_nav: "1. DigCompEdu + AI Pioneers",
m1_title: "The EU's Educator Digital Competence Framework and Its AI Supplement",
m1_overview: "DigCompEdu, published by the European Commission in 2017, is the European Framework for the Digital Competence of Educators, describing 6 competence areas and 22 sub-competencies. Since 2023, the AI Pioneers Project (funded by EU Erasmus+) has built on DigCompEdu, supplementing it with concrete AI guidance for vocational and adult education contexts, rather than creating an entirely new framework.",
m1_highlights: [
  "Six competence areas cover professional engagement, digital resources, teaching and learning, assessment, empowering learners, and facilitating learners' digital competence",
  "Six proficiency levels from A1 Newcomer to C2 Pioneer, emphasizing gradual professional growth rather than a single milestone",
  "The AI Pioneers Project focuses on practical AI applications in vocational and adult education settings",
  "Emphasizes \"competence\" over mere \"tool operation,\" valuing teachers' reflection on the pedagogical decisions behind technology choices"
],
m1_p1: "DigCompEdu's design logic centres on teacher professional development. It is not a tool manual, but a set of reference coordinates helping teachers locate themselves and plan growth. The six areas are: Professional Engagement (using digital technologies for professional communication and collaboration), Digital Resources (sourcing, creating, and sharing teaching materials), Teaching and Learning (managing and orchestrating digital technologies in the teaching process), Assessment (using digital technologies to enhance assessment strategies), Empowering Learners (using digital technologies to foster learners' active engagement), and Facilitating Learners' Digital Competence (developing learners' own digital skills).",
m1_p2: "The six proficiency levels — A1 Newcomer, A2 Explorer, B1 Integrator, B2 Expert, C1 Leader, C2 Pioneer — are not meant to label teachers as \"good\" or \"bad,\" but to describe a typical professional growth trajectory: from awareness of technology, to integrated use, to leading others and experimenting with innovation. Critically, there is no mandated timeline between levels — a teacher might be B2 in one area and still A2 in another. This flexibility is intentional.",
m1_p3: "The AI Pioneers Project extends DigCompEdu for the generative AI era rather than replacing it. It focuses specifically on vocational education and training (VET) and adult education, offering concrete approaches and case studies for integrating AI tools (conversational assistants, automated assessment, personalized learning path generation) into the existing six areas. This is a useful reminder: emerging technology frameworks are usually built atop established, mature frameworks rather than invented from scratch — an important design consideration for Taiwan as it introduces AI frameworks on campus.",
m1_wrapup: "DigCompEdu offers a six-area, six-level framework, validated across European countries and focused on teacher professional growth, while the AI Pioneers Project extends it for the generative AI era in vocational education. Together they suggest that AI literacy growth should be embedded within existing teaching professional development, not built as a separate silo.",
m1_terms: [
  { front: "DigCompEdu", back: "The European Framework for the Digital Competence of Educators, published by the European Commission in 2017, with 6 competence areas and 22 sub-competencies" },
  { front: "Six Competence Areas", back: "Professional Engagement, Digital Resources, Teaching and Learning, Assessment, Empowering Learners, Facilitating Learners' Digital Competence" },
  { front: "A1–C2 Six Levels", back: "Newcomer → Explorer → Integrator → Expert → Leader → Pioneer, describing a gradual professional growth trajectory" },
  { front: "AI Pioneers Project", back: "An EU Erasmus+ funded project building on DigCompEdu, supplementing AI application guidance for vocational and adult education" },
  { front: "Empowering Learners", back: "One of DigCompEdu's six areas, referring to using digital technologies to foster learners' personalization and active engagement" },
  { front: "Flexible Leveling", back: "Teachers may sit at different levels across different areas; the framework does not require uniform progression" }
],
m1_q: [
  { q: "Who published the DigCompEdu framework?", opts: ["UNESCO","The European Commission","The US Department of Education","The World Economic Forum"], ans: _A1, exp: "DigCompEdu was published by the European Commission in 2017." },
  { q: "How many proficiency levels does DigCompEdu define?", opts: ["3","4","6","8"], ans: _A2, exp: "There are 6 levels, from A1 Newcomer to C2 Pioneer." },
  { q: "Which of the following is NOT one of DigCompEdu's six competence areas?", opts: ["Professional Engagement","Digital Resources","Programming Proficiency","Assessment"], ans: _A2, exp: "The six areas are Professional Engagement, Digital Resources, Teaching and Learning, Assessment, Empowering Learners, and Facilitating Learners' Digital Competence — \"Programming Proficiency\" is not among them." },
  { q: "What is the relationship between the AI Pioneers Project and DigCompEdu?", opts: ["Two entirely independent, unrelated frameworks","AI Pioneers replaces DigCompEdu","AI Pioneers is an AI-focused supplement built on DigCompEdu","DigCompEdu is a simplified version of AI Pioneers"], ans: _A2, exp: "The AI Pioneers Project builds on DigCompEdu, supplementing it with AI application guidance for vocational and adult education." },
  { q: "What does DigCompEdu's C2 Pioneer level represent?", opts: ["A teacher just starting to engage with digital technology","A teacher who integrates but has not yet deepened their use","A teacher who leads and innovates within the area","A teacher who does not use digital technology at all"], ans: _A2, exp: "C2 Pioneer is the highest level, representing leadership, experimentation, and innovation in that area." }
],

// M2
m2_nav: "2. UNESCO AI Competency Framework",
m2_title: "UNESCO's AI Competency Frameworks for Students and Teachers",
m2_overview: "In 2024, UNESCO published two companion documents: the AI Competency Framework for Students and the AI Competency Framework for Teachers. Both share the same progression logic — Acquire, Deepen, Create — emphasizing that AI literacy is not just about \"knowing how to use it,\" but a journey from understanding, through application, to critical creation.",
m2_highlights: [
  "Three-tier progression: Acquire (foundational awareness), Deepen (application and evaluation), Create (design and innovation)",
  "The student framework's four dimensions: human-centred mindset, ethics of AI, AI techniques and applications, AI system design",
  "The teacher framework adds five pillars: human-centred mindset, ethical and safe AI use, AI foundations and applications, AI pedagogy, and professional development",
  "Both documents begin from \"human-centredness\" rather than from technical capability"
],
m2_p1: "The most distinctive feature of UNESCO's two frameworks is placing \"human-centred mindset\" at the very top, rather than starting with technical operation. This reflects UNESCO's consistent educational philosophy: technology should serve holistic human development, not the reverse. The student framework's four dimensions — human-centred mindset, ethics of AI, AI techniques and applications, AI system design — are deliberately ordered this way as a statement of values.",
m2_p2: "The \"Acquire, Deepen, Create\" three-tier progression differs from DigCompEdu's six-level logic; UNESCO opts for a simpler three-stage description. The Acquire stage focuses on basic awareness (knowing what AI is, what it can do, and its risks); the Deepen stage focuses on contextualized application and critical evaluation (selecting appropriate tools for specific tasks and assessing whether outputs are trustworthy); the Create stage focuses on active design and innovation (participating in, adjusting, or even questioning the decision logic of existing AI systems).",
m2_p3: "The teacher framework adds \"AI pedagogy\" and \"professional development\" pillars on top of the student framework's foundation, reflecting teachers' dual role: not merely AI users, but mediators guiding students toward AI literacy. This is why teacher competence in business courses adopting AI tools is often more complex than mere \"tool proficiency\" — teachers need both usage skills and pedagogical translation skills.",
m2_wrapup: "UNESCO's frameworks offer a concise, human-centred three-stage progression language, and through companion student and teacher documents, clearly delineate competency priorities by role — making them among the most widely cited references for AI education literacy internationally.",
m2_terms: [
  { front: "Acquire", back: "The first stage of UNESCO's three-tier progression, focused on basic awareness and understanding" },
  { front: "Deepen", back: "The second stage, focused on contextualized application and critical evaluation of AI outputs" },
  { front: "Create", back: "The third stage, focused on actively designing, adjusting, or even questioning AI systems" },
  { front: "Human-Centred Mindset", back: "The top-priority dimension shared by both student and teacher frameworks, emphasizing technology in service of people" },
  { front: "AI Pedagogy", back: "A pillar unique to the teacher framework, referring to the pedagogical skill of guiding students toward AI literacy" },
  { front: "AI System Design", back: "The fourth dimension of the student framework, referring to the ability to participate in or understand AI system design logic" }
],
m2_q: [
  { q: "What is the correct order of UNESCO's three-tier progression?", opts: ["Cognition, Application, Mastery","Acquire, Deepen, Create","Beginner, Intermediate, Advanced","Awareness, Integration, Leadership"], ans: _A1, exp: "The three tiers are Acquire, Deepen, Create." },
  { q: "What dimension do both UNESCO's student and teacher frameworks prioritize above all others?", opts: ["Programming skills","Human-centred mindset","Hardware operation skills","Marketing application skills"], ans: _A1, exp: "Both frameworks list \"human-centred mindset\" as the top-priority dimension, reflecting UNESCO's educational philosophy." },
  { q: "What pillars does the teacher framework add beyond the student framework?", opts: ["Ethics of AI","AI techniques and applications","AI pedagogy and professional development","Human-centred mindset"], ans: _A2, exp: "The teacher framework adds the \"AI pedagogy\" and \"professional development\" pillars." },
  { q: "What is the core feature of the \"Deepen\" stage?", opts: ["No engagement with AI at all","Basic awareness and understanding","Contextualized application and critical evaluation","Designing an entirely new AI system"], ans: _A2, exp: "The Deepen stage emphasizes applying AI within specific contexts and critically evaluating its outputs." },
  { q: "In what year were UNESCO's AI competency frameworks published?", opts: ["2018","2020","2024","2026"], ans: _A2, exp: "Both the student and teacher AI competency frameworks were published by UNESCO in 2024." }
],

// M3
m3_nav: "3. OECD / European Commission Framework",
m3_title: "The Joint OECD–European Commission AI Literacy Framework",
m3_overview: "The OECD and the European Commission jointly developed an AI literacy framework built around four behavioural domains: Engaging with AI, Creating with AI, Managing AI risks, and Designing AI systems. The framework also responds to a growing academic concern — \"metacognitive laziness\" — the idea that over-reliance on AI may erode users' own critical thinking and independent judgment.",
m3_highlights: [
  "Jointly developed by the OECD and the European Commission, not by the OECD alone",
  "Four behavioural domains: Engaging, Creating, Managing risk, Designing systems",
  "Responds to academic concern about \"metacognitive laziness,\" though the concept is not OECD's exclusive invention",
  "Emphasizes balancing efficiency against critical thinking, rather than promoting unconditional trust in AI tools"
],
m3_p1: "A common misconception needs clarifying first: this framework was not unilaterally created by the OECD, but is a joint product of OECD and European Commission collaboration — which also explains its strong alignment in spirit with other EU digital literacy frameworks such as DigCompEdu, sharing the same emphasis on human-centredness, critical thinking, and contextualized application.",
m3_p2: "Among the four behavioural domains, \"Engaging with AI\" is the most foundational level, referring to the ability to recognize AI systems and understand their basic operating logic and limitations; \"Creating with AI\" further requires integrating AI tools into tasks such as creation, analysis, and decision-making; \"Managing AI risks\" focuses on identifying bias, privacy, and trustworthiness risks and taking corresponding action; \"Designing AI systems\" is the most advanced domain, involving participation in constructing and adjusting AI systems themselves.",
m3_p3: "\"Metacognitive laziness\" is a concept that has gained academic attention in recent literature (such as a study published in late 2024, arXiv:2412.09315), referring to the gradual decline in users' willingness and ability to think, verify, and question independently when they over-rely on AI for answers. This concept was not exclusively coined by the OECD — it is widely discussed across academia, and OECD's Digital Education Outlook series cites and echoes this concern, but treating it as OECD's sole or exclusive framework standard would be inaccurate. For educators, this is a reminder to deliberately preserve \"AI-free\" critical thinking exercises when designing AI-integrated learning activities.",
m3_wrapup: "The OECD/EC framework describes a progressive AI literacy path through four behavioural domains, while also reminding us to watch for the \"metacognitive laziness\" risk of over-reliance on AI — an issue requiring ongoing attention from the broader academic community, not a proprietary claim of any single institution.",
m3_terms: [
  { front: "Engaging with AI", back: "The most foundational domain of the OECD/EC framework, referring to recognizing AI systems and understanding their logic and limitations" },
  { front: "Creating with AI", back: "The ability to integrate AI tools into tasks such as creation, analysis, and decision-making" },
  { front: "Managing AI Risks", back: "The ability to identify bias, privacy, and trustworthiness risks and take corresponding action" },
  { front: "Designing AI Systems", back: "The most advanced domain, involving participation in constructing and adjusting AI systems" },
  { front: "Metacognitive Laziness", back: "An academically discussed risk of declining independent thinking, verification, and questioning due to AI over-reliance — not exclusive to OECD" },
  { front: "OECD–EC Joint Development", back: "Clarifies that the framework is a joint product of OECD and European Commission collaboration, not OECD alone" }
],
m3_q: [
  { q: "Who actually developed the OECD AI literacy framework?", opts: ["The OECD alone","Jointly by the OECD and the European Commission","The European Commission alone","Led by the United Nations"], ans: _A1, exp: "This framework is a joint product of OECD and European Commission collaboration." },
  { q: "Which of the following is NOT one of the framework's four behavioural domains?", opts: ["Engaging with AI","Creating with AI","Managing AI risks","Memorizing AI algorithm formulas"], ans: _A3, exp: "The four domains are Engaging, Creating, Managing risk, and Designing systems — memorizing formulas is not among them." },
  { q: "What is the correct understanding of \"metacognitive laziness\"?", opts: ["A concept exclusively coined by and proprietary to the OECD framework","A widely discussed academic risk that OECD reports cite and echo","A psychology term entirely unrelated to AI literacy","A concept applicable only to children's education"], ans: _A1, exp: "Metacognitive laziness is widely discussed in academia; OECD reports cite and echo it, but it is not OECD's exclusive or original concept." },
  { q: "What distinguishes \"Designing AI systems\" from the other three domains?", opts: ["It is the most basic and easiest to achieve","It is entirely unrelated to the other domains","It is the most advanced, involving participation in system construction logic","It applies only to engineers, not general users"], ans: _A2, exp: "Designing AI systems is the most advanced domain among the four, involving participation in building and adjusting the system itself." },
  { q: "What is a suitable educator response to the metacognitive laziness risk?", opts: ["Completely ban students from using any AI tools","Deliberately preserve AI-free critical thinking exercises in learning design","Do nothing and trust students to self-regulate","Only mention it once before final exams"], ans: _A1, exp: "It is recommended to deliberately preserve independent thinking, verification, and questioning exercises when designing teaching activities, balancing AI use with critical thinking." }
],

// M4
m4_nav: "4. US-DOE Orientation",
m4_title: "The US Department of Education's \"Always Center Educators\" Orientation",
m4_overview: "In May 2023, the US Department of Education published a report titled \"Artificial Intelligence and the Future of Teaching and Learning,\" introducing the \"Always Center Educators\" (ACE) orientation. An important clarification: ACE is a policy spirit and value orientation, not a formal, numbered list of principles.",
m4_highlights: [
  "ACE is an orientation, not a formally numbered list of core principles",
  "Core spirit: educators should retain decision-making agency; AI assists rather than replaces",
  "Emphasizes \"human-in-the-loop\" as a precondition for designing and adopting AI tools",
  "The report acknowledges both risks and opportunities, calling for a cautious and gradual adoption pace"
],
m4_p1: "Many secondary sources describing this US-DOE report mistakenly portray ACE as a \"five principles\" or \"seven core elements\" checklist. However, reviewing the original report reveals that ACE is more accurately positioned as an orientation and value stance running throughout the document, not a list one can check off item by item. This clarification matters because it affects how we \"use\" this document — not as a compliance checklist, but as a lens for examining whether an AI education policy or tool-adoption plan genuinely places educators' professional judgment at its centre.",
m4_p2: "The core spirit of the ACE orientation can be summarized in several recurring themes: educators should retain substantive decision-making power in selecting, evaluating, and adjusting AI tools, rather than passively accepting pre-set solutions from technology companies or administrative units; AI should be designed to augment educators' professional capabilities, not replace their judgment; any AI system should preserve \"human-in-the-loop\" design, ensuring that critical educational decisions (such as student assessment and personalized learning paths) are ultimately overseen by humans.",
m4_p3: "The report also honestly presents a stance where opportunity and risk coexist — affirming AI's potential for personalized learning and administrative efficiency, while warning of risks such as data privacy, algorithmic bias, and over-automation. This \"cautious optimism\" tone aligns with the human-centred spirit shared by the three frameworks discussed earlier (DigCompEdu, UNESCO, OECD) — though they come from different institutions and use different vocabularies, all four frameworks consistently place human judgment and agency above the AI system.",
m4_wrapup: "The US-DOE's ACE orientation reminds us that the evaluation criterion for any AI education policy should return to a core question — whether educators' professional judgment is preserved and strengthened — rather than being reduced to a simple checklist.",
m4_terms: [
  { front: "ACE Orientation", back: "Always Center Educators — a policy spirit, not a formally numbered list of principles" },
  { front: "Human-in-the-Loop", back: "A design principle ensuring critical educational decisions are ultimately overseen by humans" },
  { front: "Cautious Optimism", back: "The tone of the US-DOE report, presenting both opportunities and risks of AI in education" },
  { front: "Educator Decision Agency", back: "A core ACE theme: educators should retain substantive decision-making power in selecting and adjusting AI tools" },
  { front: "Report Publication Date", back: "May 2023, \"Artificial Intelligence and the Future of Teaching and Learning\"" },
  { front: "Common Misreading", back: "Mistaking ACE for a formally numbered \"five principles\" or \"core elements\" checklist, when it is actually an orientation running throughout the report" }
],
m4_q: [
  { q: "What is ACE's correct positioning in the US-DOE report?", opts: ["A formally numbered list of five core principles","A policy orientation and value stance running throughout the report","A federally mandated US law","A technical operations manual"], ans: _A1, exp: "ACE is an orientation, not a formally numbered, itemized list of principles." },
  { q: "What is the core spirit of the ACE orientation?", opts: ["AI should completely replace teachers' judgment","Educators should retain decision-making agency; AI assists rather than replaces","Students should decide independently whether to use AI","Schools should ban all AI tools"], ans: _A1, exp: "ACE's core spirit is that educators retain decision-making agency while AI plays a supporting role." },
  { q: "What does \"human-in-the-loop\" mean?", opts: ["AI systems operate fully automatically with no human intervention","Critical educational decisions are ultimately overseen by humans","Only engineers may operate AI systems","Students must queue for computer lab access"], ans: _A1, exp: "Human-in-the-loop emphasizes that critical decisions (such as assessment) remain under human oversight rather than being fully automated by AI." },
  { q: "When was this US-DOE report published?", opts: ["2020","May 2023","2025","2026"], ans: _A1, exp: "The report \"Artificial Intelligence and the Future of Teaching and Learning\" was published in May 2023." },
  { q: "What is the report's stance toward AI's opportunities and risks in education?", opts: ["Only discusses opportunities, ignoring risks entirely","Only discusses risks, entirely dismissing opportunities","Cautiously optimistic, presenting both opportunities and risks","Refuses to take a position, remaining entirely silent"], ans: _A2, exp: "The report presents a cautiously optimistic stance, affirming potential while warning of risks such as privacy and bias." }
],

// M5
m5_nav: "5. Cross-Framework Integration",
m5_title: "Five Dimensions D1–D5: Shared Logic Across the Frameworks",
m5_overview: "Comparing the four frameworks reveals that, despite differences in vocabulary and tiering, they share a highly consistent set of core concerns. This platform integrates them into five common dimensions (D1–D5), forming the structural basis for Taiwan's localized common language.",
m5_highlights: [
  "D1 AI Foundational Literacy maps to DigCompEdu's Digital Resources, UNESCO's Acquire stage, and OECD's Engaging domain",
  "D2 Pedagogical/Applied Integration maps to DigCompEdu's Teaching and Learning, UNESCO's Deepen stage, and OECD's Creating domain",
  "D3 Ethics and Critical Judgment maps to UNESCO's Ethics of AI, OECD's metacognitive laziness warning, and US-DOE's human-in-the-loop",
  "D4 Governance and Risk Management maps to OECD's Managing risk domain and US-DOE's educator decision agency",
  "D5 Continuous Growth and Innovation maps to DigCompEdu's C1–C2 Leader/Pioneer levels and UNESCO's Create stage"
],
m5_p1: "When the four frameworks are placed side by side, despite their distinct development contexts and emphases, a shared underlying logic emerges: competency development begins with foundational awareness, progresses toward applied integration, deepens into ethical and critical judgment, requires governance and risk management as a support structure, and ultimately points toward continuous growth. These five stages are not linear exam checkpoints but five coexisting, mutually reinforcing dimensions.",
m5_p2: "Take D1 AI Foundational Literacy as an example: it maps to DigCompEdu's \"Digital Resources\" area, UNESCO's \"Acquire\" stage, and OECD's \"Engaging with AI\" domain — different vocabularies, but all pointing to the same starting point: knowing what AI is, what it can do, and where its limitations lie. D2 Pedagogical/Applied Integration maps to DigCompEdu's \"Teaching and Learning,\" UNESCO's \"Deepen\" stage, and OECD's \"Creating with AI\" — all three share a concern for whether AI tools can be effectively integrated into specific task contexts.",
m5_p3: "D3 Ethics and Critical Judgment integrates UNESCO's \"Ethics of AI\" dimension, OECD's warning about \"metacognitive laziness,\" and US-DOE's \"human-in-the-loop\" design principle — together reminding us that AI literacy is not just technical capability, but also knowing when to question, verify, and insist on human judgment. D4 Governance and Risk Management echoes OECD's \"Managing risk\" domain and US-DOE's emphasis on \"educator decision agency,\" focusing on organizational-level policy and support mechanisms. D5 Continuous Growth and Innovation maps to DigCompEdu's top two levels (C1 Leader, C2 Pioneer) and UNESCO's \"Create\" stage, pointing to the idea that competency development has no endpoint, but is an ongoing journey of refinement.",
m5_wrapup: "D1–D5 are not a new framework, but the \"greatest common factor\" of the four international references — enabling principals, teachers, students, and families to discuss AI literacy using the same five dimensions, while still being able to trace back to the original frameworks for detail.",
m5_terms: [
  { front: "D1 AI Foundational Literacy", back: "The starting dimension: knowing what AI is, what it can do, and where its limitations lie" },
  { front: "D2 Pedagogical/Applied Integration", back: "Whether AI tools can be effectively integrated into specific tasks and teaching contexts" },
  { front: "D3 Ethics and Critical Judgment", back: "The ability to know when to question, verify, and insist on human judgment" },
  { front: "D4 Governance and Risk Management", back: "Organizational-level AI usage policy, risk identification, and support mechanisms" },
  { front: "D5 Continuous Growth and Innovation", back: "Competency development has no endpoint — an ongoing journey of refinement, leadership, and innovation" },
  { front: "Greatest Common Factor Logic", back: "D1–D5 integrate the shared concerns of all four frameworks rather than establishing a new standard" }
],
m5_q: [
  { q: "What does D1 AI Foundational Literacy primarily correspond to across the four frameworks?", opts: ["DigCompEdu Digital Resources, UNESCO Acquire, OECD Engaging","DigCompEdu C2, UNESCO Create, OECD Designing systems","Only the US-DOE orientation","Unrelated to any of the four frameworks"], ans: _A0, exp: "D1 maps to DigCompEdu's Digital Resources area, UNESCO's Acquire stage, and OECD's Engaging with AI domain." },
  { q: "What does D3 Ethics and Critical Judgment integrate?", opts: ["Only DigCompEdu's Assessment area","UNESCO's Ethics of AI, OECD's metacognitive laziness warning, and US-DOE's human-in-the-loop","Only UNESCO's human-centred mindset","Only OECD's Designing systems domain"], ans: _A1, exp: "D3 integrates UNESCO's Ethics of AI dimension, OECD's metacognitive laziness warning, and US-DOE's human-in-the-loop principle." },
  { q: "What is the purpose of the D1–D5 five dimensions?", opts: ["To replace the four international frameworks as a new standard","To serve as the greatest common factor of the four frameworks, providing a shared dialogue language","Only for academic research, unsuitable for practical adoption","Only applicable to STEM fields, not business education"], ans: _A1, exp: "D1–D5 integrate the four frameworks to serve as a common language, not a replacement." },

/* ============ TTS ============ */
function pickVoice(lang) {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  if (lang === 'zh') {
    return voices.find(v => /Yating/i.test(v.name)) || voices.find(v => /zh-TW|zh_TW/i.test(v.lang)) || voices.find(v => /zh/i.test(v.lang));
  }
  return voices.find(v => /Daniel/i.test(v.name)) || voices.find(v => /en-GB/i.test(v.lang)) || voices.find(v => /en/i.test(v.lang));
}
function speakText(text, lang, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'zh' ? 'zh-TW' : 'en-GB';
  const v = pickVoice(lang);
  if (v) u.voice = v;
  u.rate = 0.98;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
}

/* ============ FlipCardDeck ============ */
const FlipCardDeck = ({ terms, t, moduleId, onCardRead }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  const [readSet, setReadSet] = useState(new Set());
  const [shownSet, setShownSet] = useState(new Set());

  const [shuffledOrder] = useState(() => [...Array(terms.length).keys()].sort(() => Math.random() - 0.5));

  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);

  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) setShownSet(newShown);
  }, [groupIdx]);

  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, newRead.size, shownSet.size, terms.length);
    }
  };

  const statusText = t.flip_status.replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);

  return (
    <div className="mt-8" key={`cards-${moduleId}`}>
      <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 dark:text-slate-300 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 dark:text-slate-300 mb-4">{statusText}</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {currentCardIndices.map((origIdx) => {
          const term = terms[origIdx];
          return (
            <div key={origIdx} className="perspective cursor-pointer h-36" onClick={() => handleFlip(origIdx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped[origIdx] ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{term.front}</p>
                  <p className="text-xs text-slate-400 dark:text-slate-300 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{term.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3 mt-4">
        <button onClick={() => { setGroupIdx(0); setFlipped({}); }}
          className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.flip_retry}
        </button>
        <button onClick={() => groupIdx < totalGroups - 1 && setGroupIdx(groupIdx + 1)}
          disabled={groupIdx >= totalGroups - 1}
          className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
          {t.flip_next}
        </button>
      </div>
    </div>
  );
};

/* ============ ModuleQuiz ============ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit, moduleName }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState({});
  const [groupIdx, setGroupIdx] = useState(0);
  const groupSize = 2;

  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5));
  const totalGroups = Math.ceil(quizIndices.length / groupSize);

  const [shuffledMaps] = useState(() =>
    quizIndices.map(qIdx => {
      const n = questions[qIdx].opts.length;
      return [...Array(n).keys()].sort(() => Math.random() - 0.5);
    })
  );

  const totalAnswered = Object.keys(selected).length;
  const computeCorrect = () => {
    let c = 0;
    quizIndices.forEach((qIdx, qi) => {
      if (selected[qi] === undefined) return;
      if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) c++;
    });
    return c;
  };
  const statusText = t.quiz_status.replace('{correct}', computeCorrect()).replace('{answered}', totalAnswered).replace('{total}', quizIndices.length);

  const currentStart = groupIdx * groupSize;
  const currentIndices = quizIndices.slice(currentStart, currentStart + groupSize);

  const handleGroupSubmit = () => {
    const allDone = currentIndices.every((_, i) => selected[currentStart + i] !== undefined);
    if (!allDone) return;
    const newSubmitted = { ...submitted, [groupIdx]: true };
    setSubmitted(newSubmitted);
    if (Object.keys(newSubmitted).length === totalGroups) {
      const wrongQs = [];
      let correct = 0;
      quizIndices.forEach((qIdx, qi) => {
        if (selected[qi] === undefined) return;
        if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) correct++;
        else wrongQs.push(questions[qIdx].q);
      });
      onQuizSubmit(moduleId, correct, quizIndices.length, wrongQs, moduleName);
    }
  };

  const handleRetry = () => {
    setSelected({}); setSubmitted({}); setGroupIdx(0);
  };

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700" key={`quiz-${moduleId}`}>
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{t.quiz_title}</h3>
      <p className="text-sm text-slate-400 dark:text-slate-300 mb-6">{statusText}</p>
      {currentIndices.map((qIdx, localI) => {
        const qi = currentStart + localI;
        const q = questions[qIdx];
        const sMap = shuffledMaps[qi];
        const isGrpSub = !!submitted[groupIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{qi + 1}. {q.q}</p>
            <div className="space-y-2">
              {sMap.map((origIdx, dIdx) => {
                const isCorrectOpt = origIdx === _d(q.ans);
                const isSel = selected[qi] === dIdx;
                let cls = "w-full text-left px-4 py-3 rounded-lg border transition-all text-sm ";
                if (isGrpSub) {
                  if (isCorrectOpt) cls += "border-green-500 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300";
                  else if (isSel) cls += "border-red-500 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300";
                  else cls += "border-slate-200 dark:border-slate-700 opacity-60";
                } else {
                  cls += isSel ? "border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/10" : "border-slate-200 dark:border-slate-700 hover:border-slate-400";
                }
                return (
                  <button key={dIdx} onClick={() => !isGrpSub && setSelected(s => ({ ...s, [qi]: dIdx }))} className={cls}>
                    {q.opts[origIdx]}
                  </button>
                );
              })}
            </div>
            {isGrpSub && (
              <p className="mt-2 text-xs text-slate-500 dark:text-slate-400 italic">{t.explanation}：{q.exp}</p>
            )}
          </div>
        );
      })}
      <div className="flex items-center gap-3 mt-4">
        <button onClick={handleRetry} className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.quiz_retry}
        </button>
        {!submitted[groupIdx] ? (
          <button onClick={handleGroupSubmit} className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">
            {t.submit}
          </button>
        ) : (
          <button onClick={() => groupIdx < totalGroups - 1 && setGroupIdx(groupIdx + 1)}
            disabled={groupIdx >= totalGroups - 1}
            className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
            {t.quiz_next}
          </button>
        )}
      </div>
    </div>
  );
};

/* ============ LabAssessment Component ============ */
const LabAssessment = ({ t, lang, isDark, onLabComplete }) => {
  const [role, setRole] = useState(null);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  const bank = role ? LAB_BANKS[lang][role] : null;

  const handleSelect = (idx, val) => setAnswers(a => ({ ...a, [idx]: val }));

  const allAnswered = bank ? bank.every((_, i) => answers[i] !== undefined) : false;

  const dimScores = useMemo(() => {
    if (!bank || !submitted) return null;
    const sums = {}, counts = {};
    LAB_DIMS.forEach(d => { sums[d] = 0; counts[d] = 0; });
    bank.forEach((item, i) => {
      if (answers[i] !== undefined) { sums[item.dim] += answers[i] + 1; counts[item.dim]++; }
    });
    const result = {};
    LAB_DIMS.forEach(d => { result[d] = counts[d] > 0 ? +(sums[d] / counts[d]).toFixed(2) : 0; });
    return result;
  }, [submitted]);

  useEffect(() => {
    if (submitted && dimScores && chartRef.current) {
      if (chartInstance.current) chartInstance.current.destroy();
      const labels = LAB_DIMS.map(d => `${d} ${LAB_DIM_LABEL[lang][d]}`);
      const data = LAB_DIMS.map(d => dimScores[d]);
      const gridColor = isDark ? 'rgba(216,195,165,0.2)' : 'rgba(0,64,48,0.15)';
      const textColor = isDark ? '#D8C3A5' : '#004030';
      chartInstance.current = new Chart(chartRef.current, {
        type: 'radar',
        data: { labels, datasets: [{ label: t.mlab_result_title, data, backgroundColor: isDark ? 'rgba(216,195,165,0.25)' : 'rgba(0,64,48,0.2)', borderColor: isDark ? '#D8C3A5' : '#004030', pointBackgroundColor: isDark ? '#D8C3A5' : '#004030' }] },
        options: { scales: { r: { min: 0, max: 6, ticks: { stepSize: 1, color: textColor, backdropColor: 'transparent' }, grid: { color: gridColor }, angleLines: { color: gridColor }, pointLabels: { color: textColor, font: { size: 11 } } } }, plugins: { legend: { display: false } } }
      });
    }
    return () => { if (chartInstance.current && submitted === false) { chartInstance.current.destroy(); chartInstance.current = null; } };
  }, [submitted, lang, isDark]);

  const levelFor = (score) => {
    if (score < 3) return t.mlab_level_low;
    if (score < 4.5) return t.mlab_level_mid;
    return t.mlab_level_high;
  };

  const reset = () => { setRole(null); setAnswers({}); setSubmitted(false); };

  const handleSubmit = () => {
    setSubmitted(true);
    if (onLabComplete) onLabComplete(role);
  };

  if (!role) {
    return (
      <div className="animate-fade-in">
        <h3 className="text-lg font-bold mb-4">{t.mlab_select_role}</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {[['principal', t.mlab_role_principal, IconFlag], ['teacher', t.mlab_role_teacher, IconBookOpen], ['student', t.mlab_role_student, IconUsers], ['parent', t.mlab_role_parent, IconGlobe]].map(([key, label, Icon]) => (
            <button key={key} onClick={() => setRole(key)} className="flex items-center gap-3 p-5 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left">
              <Icon className="w-6 h-6 text-[#004030] dark:text-[#D8C3A5] shrink-0" />
              <span className="font-bold">{label}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (submitted && dimScores) {
    const overallScore = +(LAB_DIMS.reduce((sum, d) => sum + dimScores[d], 0) / LAB_DIMS.length).toFixed(2);
    const overallLevel = levelFor(overallScore);
    return (
      <div className="animate-fade-in">
        <button onClick={reset} className="text-sm mb-4 text-slate-500 dark:text-slate-300 hover:text-[#004030] dark:hover:text-[#D8C3A5]">{t.mlab_back_roles}</button>
        <h3 className="text-xl font-serif font-bold mb-1">{t.mlab_result_title}</h3>
        <p className="text-sm text-slate-500 dark:text-slate-300 mb-4">{t.mlab_result_desc}</p>
        <div className="max-w-md mx-auto mb-6 p-5 rounded-2xl bg-[#004030] dark:bg-[#D8C3A5] text-center">
          <p className="text-xs font-bold uppercase tracking-wider text-[#D8C3A5] dark:text-[#004030] opacity-80 mb-1">{t.mlab_overall_label}</p>
          <p className="text-4xl font-serif font-black text-white dark:text-[#004030]">{overallScore} <span className="text-lg font-sans font-normal opacity-80">/ 6</span></p>
          <p className="text-sm font-bold text-[#D8C3A5] dark:text-[#004030] mt-1">{overallLevel}</p>
        </div>
        <div className="max-w-md mx-auto mb-6"><canvas ref={chartRef}></canvas></div>
        <div className="space-y-2 max-w-md mx-auto">
          {LAB_DIMS.map(d => (
            <div key={d} className="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">
              <span className="text-sm font-medium">{d} {LAB_DIM_LABEL[lang][d]}</span>
              <span className="text-sm font-bold text-[#004030] dark:text-[#D8C3A5]">{dimScores[d]} / 6 · {levelFor(dimScores[d])}</span>
            </div>
          ))}
        </div>
        <div className="text-center mt-6">
          <button onClick={reset} className="px-5 py-2.5 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">{t.mlab_retry_assess}</button>
        </div>
      </div>
    );
  }

  return (
    <div className="animate-fade-in">
      <button onClick={reset} className="text-sm mb-4 text-slate-500 dark:text-slate-300 hover:text-[#004030] dark:hover:text-[#D8C3A5]">{t.mlab_back_roles}</button>
      <div className="space-y-6 max-w-2xl">
        {bank.map((item, i) => (

/* ============ Analytics Module (M{N+3}) ============ */
const LS_KEY = 'aicf_analytics_v1';

function loadAnalytics() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : { modules: {}, totalClicks: 0, totalTime: 0, info: {} };
  } catch (e) { return { modules: {}, totalClicks: 0, totalTime: 0, info: {} }; }
}
function saveAnalytics(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
}

const AnalyticsPage = ({ t, lang, analytics, setAnalytics }) => {
  const [form, setForm] = useState(analytics.info || {});
  const ttsRef = useRef(false);

  const moduleKeys = [...Array(NUM_LEARN).keys()].map(i => i + 1);
  const moduleNames = moduleKeys.map(i => dict[lang][`m${i}_nav`]);

  const totalClicks = analytics.totalClicks || 0;
  const totalTime = analytics.totalTime || 0;
  let totalCorrect = 0, totalQ = 0;
  moduleKeys.forEach(i => {
    const m = analytics.modules[i];
    if (m && m.quizTotal) { totalCorrect += m.quizCorrect; totalQ += m.quizTotal; }
  });
  const overallAcc = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : null;

  let totalRead = 0, totalCards = 0;
  moduleKeys.forEach(i => {
    const m = analytics.modules[i];
    if (m) { totalRead += (m.cardsRead || 0); totalCards += (m.cardsTotal || 0); }
  });
  const cardUsage = totalCards > 0 ? Math.round((totalRead / totalCards) * 100) : 0;

  const weakModules = moduleKeys
    .map(i => ({ idx: i, name: moduleNames[i-1], m: analytics.modules[i] }))
    .filter(x => x.m && x.m.quizTotal > 0)
    .map(x => ({ ...x, acc: Math.round((x.m.quizCorrect / x.m.quizTotal) * 100) }))
    .filter(x => x.acc < 75);

  const visitedCount = moduleKeys.filter(i => analytics.modules[i] && analytics.modules[i].visited).length;
  const quizDoneCount = moduleKeys.filter(i => analytics.modules[i] && analytics.modules[i].quizTotal > 0).length;

  const updateForm = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const formComplete = form.group && form.dept && form.id && form.nameEn && form.nameZh;

  const handleExport = () => {
    if (!formComplete) return;
    const rows = [['Module', 'TimeSpent(s)', 'Clicks', 'CardsRead', 'CardsTotal', 'QuizCorrect', 'QuizTotal']];
    moduleKeys.forEach(i => {
      const m = analytics.modules[i] || {};
      rows.push([moduleNames[i-1], m.time || 0, m.clicks || 0, m.cardsRead || 0, m.cardsTotal || 0, m.quizCorrect || 0, m.quizTotal || 0]);
    });
    const meta = [['Group', form.group], ['Dept', form.dept], ['ID', sanitizeStudentId(form.id)], ['NameEN', sanitizeName(form.nameEn)], ['NameZH', sanitizeName(form.nameZh)], ['ExportDate', new Date().toISOString()]];
    const csv = '﻿' + meta.map(r => r.join(',')).join('\n') + '\n\n' + rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `AI素養學習歷程_${sanitizeName(form.nameZh)}_${Date.now()}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    const newAnalytics = { ...analytics, info: form };
    setAnalytics(newAnalytics); saveAnalytics(newAnalytics);
  };

  const handleClear = () => {
    if (window.confirm(t.analytics_wp_clear_confirm)) {
      const fresh = { modules: {}, totalClicks: 0, totalTime: 0, info: {} };
      setAnalytics(fresh); saveAnalytics(fresh); setForm({});
    }
  };

  const handlePlayWeak = () => {
    let text = t.analytics_wp_tts_intro + ' ';
    if (weakModules.length === 0) text += t.analytics_wp_tts_allpass;
    else weakModules.forEach(w => { text += t.analytics_wp_tts_module.replace('{name}', w.name).replace('{acc}', w.acc) + ' '; });
    speakText(text, lang);
  };

  return (
    <div className="animate-fade-in max-w-3xl">
      <span className="text-xs font-bold uppercase tracking-widest text-[#004030] dark:text-[#D8C3A5]">{t.analytics_title}</span>
      <h1 className="text-3xl md:text-4xl font-serif font-black text-slate-900 dark:text-white mb-3 mt-2">{t.analytics_title}</h1>
      <p className="text-sm text-slate-500 dark:text-slate-300 mb-8">{t.analytics_desc}</p>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        {[[t.analytics_total_time, `${totalTime}${t.analytics_sec}`], [t.analytics_total_clicks, `${totalClicks}${t.analytics_times}`], [t.analytics_overall_acc, overallAcc !== null ? `${overallAcc}%` : t.analytics_no_data], [t.analytics_card_usage, `${cardUsage}%`]].map(([label, val], i) => (
          <div key={i} className="p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
            <p className="text-2xl font-black text-[#004030] dark:text-[#D8C3A5]">{val}</p>
            <p className="text-xs text-slate-500 dark:text-slate-300 mt-1">{label}</p>
          </div>
        ))}
      </div>

      <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-300 mb-3">{t.analytics_progress_title}</h2>
      <div className="grid grid-cols-2 gap-4 mb-3 text-sm">
        <p>{t.analytics_progress_visited}: {visitedCount} / {NUM_LEARN}</p>
        <p>{t.analytics_progress_quiz_done}: {quizDoneCount} / {NUM_LEARN}</p>
      </div>
      <div className="overflow-x-auto mb-8">
        <table className="w-full text-xs border-collapse">
          <thead><tr className="text-left text-slate-500 dark:text-slate-300 border-b border-slate-200 dark:border-slate-700">
            <th className="py-2 pr-2">{t.analytics_module}</th><th className="py-2 pr-2">{t.analytics_time}</th><th className="py-2 pr-2">{t.analytics_clicks}</th><th className="py-2 pr-2">{t.analytics_cards_read_total}</th><th className="py-2 pr-2">{t.analytics_correct_ans_total}</th>
          </tr></thead>
          <tbody>
            {moduleKeys.map(i => {
              const m = analytics.modules[i] || {};
              return (
                <tr key={i} className="border-b border-slate-100 dark:border-slate-800">
                  <td className="py-2 pr-2">{moduleNames[i-1]}</td>
                  <td className="py-2 pr-2">{m.time || 0}{t.analytics_sec}</td>
                  <td className="py-2 pr-2">{m.clicks || 0}</td>
                  <td className="py-2 pr-2">{m.cardsRead || 0} / {m.cardsTotal || 0}</td>
                  <td className="py-2 pr-2">{m.quizTotal ? `${m.quizCorrect} / ${m.quizTotal}` : t.analytics_no_data}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="mb-8 p-5 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-300">{t.analytics_wp_title}</h2>
          <button onClick={handlePlayWeak} className="text-xs flex items-center gap-1 px-2 py-1 rounded border border-slate-300 dark:border-slate-600"><IconPlay className="w-3 h-3"/>{t.audio_read}</button>
        </div>
        {weakModules.length === 0 ? (
          <p className="text-sm text-green-600 dark:text-green-400">{t.analytics_wp_allpass}</p>
        ) : (
          <ul className="space-y-2">
            {weakModules.map(w => (
              <li key={w.idx} className="text-sm flex items-center justify-between">
                <span>{w.name} — {t.analytics_wp_incorrect} {w.acc}%</span>
                <button onClick={() => window.__aicf_nav && window.__aicf_nav(w.idx)} className="text-xs text-[#004030] dark:text-[#D8C3A5] font-bold">{t.analytics_wp_goto}</button>
              </li>
            ))}
          </ul>
        )}
      </div>

      <div className="p-5 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
        <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-300 mb-3">{t.analytics_form_title}</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
          <select value={form.group || ''} onChange={e => updateForm('group', e.target.value)} className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent">
            <option value="">{t.analytics_group_select}</option>
            {t.group_options.map(g => <option key={g} value={g}>{g}</option>)}
          </select>
          <input placeholder={t.analytics_dept_ph} value={form.dept || ''} onChange={e => updateForm('dept', e.target.value)} className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent" />
          <input placeholder={t.analytics_id_ph} value={form.id || ''} onChange={e => updateForm('id', sanitizeStudentId(e.target.value))} className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent" />
          <input placeholder={t.analytics_name_en_ph} value={form.nameEn || ''} onChange={e => updateForm('nameEn', sanitizeName(e.target.value))} className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent" />
          <input placeholder={t.analytics_name_zh_ph} value={form.nameZh || ''} onChange={e => updateForm('nameZh', sanitizeName(e.target.value))} className="px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent" />
        </div>
        <div className="flex items-center gap-3 flex-wrap">
          <button onClick={handleExport} disabled={!formComplete} className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.analytics_export_csv}</button>
          {!formComplete && <span className="text-xs text-slate-400 dark:text-slate-300">{t.analytics_fill_required}</span>}
          <button onClick={handleClear} className="ml-auto text-xs text-red-500 hover:underline">{t.analytics_wp_clear}</button>
        </div>
        <p className="text-xs text-slate-400 dark:text-slate-300 mt-3">{t.analytics_wp_saved}</p>
      </div>
    </div>
  );
};

/* ============ Main App ============ */
function App() {
  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [page, setPage] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const [analytics, setAnalytics] = useState(() => loadAnalytics());
  const visitStart = useRef(Date.now());
  const clickCount = useRef(0);

  const t = dict[lang];

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  useEffect(() => {
    window.__aicf_nav = (idx) => setPage(idx);
    window.showCopyrightToast = showCopyrightToast;
    return () => { delete window.__aicf_nav; };
  }, []);

  // Track time-on-module
  useEffect(() => {
    visitStart.current = Date.now();
    clickCount.current = 0;
    if (page >= 1 && page <= NUM_LEARN) {
      setAnalytics(prev => {
        const next = { ...prev, modules: { ...prev.modules, [page]: { ...(prev.modules[page] || {}), visited: true } } };
        saveAnalytics(next);
        return next;
      });
    }
    return () => {
      const elapsed = Math.round((Date.now() - visitStart.current) / 1000);
      if (page >= 1 && page <= NUM_LEARN && elapsed > 0) {
        setAnalytics(prev => {
          const m = prev.modules[page] || {};
          const next = { ...prev, totalTime: (prev.totalTime || 0) + elapsed, totalClicks: (prev.totalClicks || 0) + clickCount.current, modules: { ...prev.modules, [page]: { ...m, time: (m.time || 0) + elapsed, clicks: (m.clicks || 0) + clickCount.current } } };
          saveAnalytics(next);
          return next;
        });
      }
    };
  }, [page]);

  useEffect(() => {
    const onClick = () => { clickCount.current += 1; };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  const handleCardRead = (moduleId, read, shown, total) => {
    setAnalytics(prev => {
      const m = prev.modules[moduleId] || {};
      const next = { ...prev, modules: { ...prev.modules, [moduleId]: { ...m, cardsRead: read, cardsTotal: total } } };
      saveAnalytics(next);
      return next;
    });
  };

  const handleQuizSubmit = (moduleId, correct, total, wrongQs, moduleName) => {
    setAnalytics(prev => {
      const m = prev.modules[moduleId] || {};
      const next = { ...prev, modules: { ...prev.modules, [moduleId]: { ...m, quizCorrect: correct, quizTotal: total, wrongQs } } };
      saveAnalytics(next);
      return next;
    });
  };

  const handleTogglePlay = (text) => {
    if (isPlaying) { window.speechSynthesis.cancel(); setIsPlaying(false); return; }
    setIsPlaying(true);
    speakText(text, lang, () => setIsPlaying(false));
  };

  const navItems = [
    { idx: 0, label: t.m0_nav, icon: IconHome },
    ...[...Array(NUM_LEARN).keys()].map(i => ({ idx: i + 1, label: t[`m${i+1}_nav`], icon: IconCpu })),
    { idx: IDX_LAB, label: t.mlab_nav, icon: IconZapLab },
    { idx: IDX_RES, label: t.mres_nav, icon: IconGlobe },
    { idx: IDX_ANA, label: t.analytics_title, icon: IconActivity }
  ];

  let content;
  if (page === 0) content = <M0Page t={t} onNav={setPage} isPlaying={isPlaying} onTogglePlay={handleTogglePlay} />;
  else if (page >= 1 && page <= NUM_LEARN) content = <LearningModule idx={page} t={t} lang={lang} onNav={setPage} onCardRead={handleCardRead} onQuizSubmit={handleQuizSubmit} isPlaying={isPlaying} onTogglePlay={handleTogglePlay} />;
  else if (page === IDX_LAB) content = <LabPage t={t} lang={lang} isDark={isDark} onLabComplete={() => {}} />;
  else if (page === IDX_RES) content = <ResourcesPage t={t} />;
  else if (page === IDX_ANA) content = <AnalyticsPage t={t} lang={lang} analytics={analytics} setAnalytics={setAnalytics} />;

  const mainRef = useRef(null);
  const scrollContentTop = () => {
    if (mainRef.current) mainRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const goHomeTop = () => { setPage(0); setSidebarOpen(false); setTimeout(scrollContentTop, 0); };
  const navTo = (idx) => { setPage(idx); setSidebarOpen(false); setTimeout(scrollContentTop, 0); };

  return (
    <div className="min-h-screen flex flex-col">
      <header className="h-16 shrink-0 flex items-center justify-between px-2 md:px-6 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40">
        <div className="flex items-center gap-1 md:gap-3 min-w-0">
          <button className="md:hidden p-2 shrink-0" onClick={() => setSidebarOpen(s => !s)} aria-label={t.sidebar_title}>
            {sidebarOpen ? <IconX className="w-6 h-6" /> : <IconMenu className="w-6 h-6" />}
          </button>
          <button onClick={goHomeTop} className="font-serif font-black text-lg text-[#004030] dark:text-[#D8C3A5] shrink-0 hover:opacity-70 transition-opacity">{t.brand}</button>
          <button onClick={scrollContentTop} className="hidden md:inline text-sm text-slate-500 dark:text-slate-400 truncate hover:text-[#004030] dark:hover:text-[#D8C3A5] transition-colors text-left">{t.title}</button>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')} className="px-3 py-1.5 text-sm font-medium rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700">{t.lang_toggle}</button>
          <button onClick={() => setIsDark(d => !d)} aria-label={t.theme_toggle_label} className="p-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700">
            {isDark ? <IconSun className="w-4 h-4" /> : <IconMoon className="w-4 h-4" />}
          </button>
        </div>
      </header>

      <div className="flex flex-1 relative">
        {sidebarOpen && (
          <div className="fixed inset-0 top-16 bg-black/40 z-20 md:hidden" onClick={() => setSidebarOpen(false)} />
        )}
        <aside className={`fixed md:sticky top-16 md:top-16 left-0 h-[calc(100vh-4rem)] w-64 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 overflow-y-auto z-30 transition-transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
          <p className="px-4 pt-4 pb-2 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.sidebar_title}</p>
          <nav className="px-2 space-y-1 pb-6">
            {navItems.map(item => (
              <button key={item.idx} onClick={() => navTo(item.idx)}
                className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-left transition-colors ${page === item.idx ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                <item.icon className="w-4 h-4 shrink-0" />
                <span className="truncate">{item.label}</span>
              </button>
            ))}
          </nav>
        </aside>

        <main ref={mainRef} className="flex-1 w-full min-w-0 px-4 md:px-10 py-8 md:py-12">
          {content}
        </main>
      </div>

      <footer className="h-8 shrink-0 flex items-center justify-center gap-3 px-4 text-[11px] text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
        <span>{t.date}</span><span>·</span><span>{t.copyright}</span><span>·</span>
        <span>{t.architect_label} <a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="hover:text-[#004030] dark:hover:text-[#D8C3A5] underline">{t.architect_name}</a></span>
        <span>·</span>
        <button onClick={scrollContentTop} className="font-bold text-[#004030] dark:text-[#D8C3A5] hover:underline ml-auto">{t.footer_top || 'Top \u2191'}</button>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
